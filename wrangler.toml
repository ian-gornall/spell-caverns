# wrangler.toml — Cloudflare Worker (Static Assets model).
#
# Hosting moved off Netlify (free-tier build credits ran out). Cloudflare's "Connect to Git"
# provisions a WORKER and runs `wrangler deploy`, so this is configured as a Worker that serves
# the static PWA (deploy/) plus the /api/sync route (worker.js).
#
# Cloudflare dashboard → your Worker → Settings → Build:
#   Build command:  node scripts/build_deploy.mjs     (assembles ./deploy)
#   Deploy command: npx wrangler deploy                (default; reads this file)
name = "spell-caverns"
main = "worker.js"
compatibility_date = "2024-11-01"

# Static PWA assets (assembled by scripts/build_deploy.mjs). Served first; the Worker only
# runs for non-asset paths (e.g. /api/sync). _headers in deploy/ sets the cache rules.
[assets]
directory = "./deploy"
binding = "ASSETS"

# Family-sync storage (worker.js handleSync, engine/cloudsync reconcile). Namespace created
# 2026-06-18 via `wrangler kv namespace create FAMILY_SYNC`. Git deploys honour this binding.
[[kv_namespaces]]
binding = "FAMILY_SYNC"
id = "8646bafb7f3c43a28808b93b8007ce4d"
