# Deploy Crystal Spell Caverns as a STATIC site (no build step). Netlify serves the
# repo root over HTTPS at a stable URL — which is all the PWA needs to (a) install on
# the iPad home screen and (b) cache offline (the service worker requires HTTPS).
#
# Drag-and-drop the project folder onto app.netlify.com, OR "Add new site → import an
# existing project" and point it at this repo. No build command, publish the root.
[build]
  publish = "."
  command = ""

# Always revalidate the service worker + app shell so a redeploy reaches already-
# installed devices promptly (the SW then swaps in the new precache on its next
# VERSION bump). Everything else is content-hashed by path and cached by the SW.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
