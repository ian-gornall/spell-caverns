# Netlify config. The app is a static, no-bundler PWA; this build just COPIES the
# runtime files into ./deploy (scripts/build_deploy.mjs) and publishes that, plus the
# serverless family-sync function (netlify/functions). Connect this repo to Netlify
# ("Add new site → import an existing project") so functions are built + bundled.
#
# (Pure drag-and-drop of ./deploy still works for the no-backend fallback, but the
# family-sync backend needs this Git-connected build so the function is deployed.)
[build]
  command = "node scripts/build_deploy.mjs"
  publish = "deploy"

[build.environment]
  # Install only runtime deps (@netlify/blobs for the function) — skip the heavy
  # devDeps (playwright/lamejs) that are only for local testing + audio generation.
  NPM_FLAGS = "--omit=dev"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Always revalidate the service worker + app shell so a redeploy reaches installed
# devices promptly (the SW then swaps in the new precache on its next VERSION bump).
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
